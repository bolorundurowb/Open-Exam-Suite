name: Build, Test & Coverage

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore solutions/oes-all.sln

    - name: Build
      run: dotnet build solutions/oes-all.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test solutions/oes-all.sln --no-build --configuration Release --verbosity normal
